services:
  - type: web
    name: seo-automation-os
    env: node
    plan: free
    buildCommand: echo "No build required"
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: seo-automation-data
      mountPath: /var/data
      sizeGB: 1
