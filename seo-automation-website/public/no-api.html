<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>No-API SEO Automation OS</title>
<meta name="description" content="A no-API, offline SEO automation dashboard for projects, audits, keyword mapping, sitemaps, robots.txt, schema, reports, and GEO optimization.">
<style>
:root{--bg:#07101f;--panel:#101b2e;--panel2:#15233a;--text:#edf6ff;--muted:#9fb0ce;--line:rgba(255,255,255,.14);--green:#62e6b8;--blue:#65a7ff;--yellow:#ffd166;--red:#ff6b8a;--r:20px}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at 0 0,rgba(101,167,255,.25),transparent 34rem),radial-gradient(circle at 80% 10%,rgba(98,230,184,.16),transparent 30rem),#07101f;color:var(--text)}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);background:rgba(5,10,18,.58);padding:22px;position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:12px;font-weight:900;font-size:20px;letter-spacing:-.04em}.logo{width:40px;height:40px;border-radius:14px;background:conic-gradient(var(--green),var(--blue),#b884ff,var(--green))}.nav{display:grid;gap:8px;margin-top:28px}.nav button{border:1px solid transparent;background:transparent;color:var(--muted);padding:12px;border-radius:14px;text-align:left}.nav button.active,.nav button:hover{background:rgba(255,255,255,.08);color:var(--text);border-color:var(--line)}main{padding:28px;max-width:1300px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:22px}.hero{background:linear-gradient(135deg,rgba(98,230,184,.14),rgba(101,167,255,.12));border:1px solid var(--line);border-radius:28px;padding:28px;margin-bottom:20px}h1{font-size:clamp(34px,5vw,62px);line-height:.95;letter-spacing:-.07em;margin:0 0 12px}h2{letter-spacing:-.045em;margin:0 0 14px;font-size:30px}h3{margin:0 0 10px;letter-spacing:-.025em}.muted{color:var(--muted);line-height:1.55}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.18)}.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}.stat b{font-size:34px;display:block}.btn{border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);border-radius:13px;padding:11px 14px;font-weight:800}.btn.primary{background:linear-gradient(135deg,var(--green),var(--blue));border:0;color:#06111e}.btn.red{background:rgba(255,107,138,.13);border-color:rgba(255,107,138,.3)}input,textarea,select{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--text);border-radius:13px;padding:12px;margin-top:6px;outline:none}textarea{min-height:105px}.form{display:grid;gap:12px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:13px;background:rgba(255,255,255,.055)}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top;color:var(--muted)}th{color:var(--text)}.score{width:130px;height:130px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--green) calc(var(--p)*1%),rgba(255,255,255,.1) 0);margin:auto}.score div{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;background:#0d1728;font-size:28px;font-weight:900}.ok{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.27);border:1px solid var(--line);border-radius:14px;padding:14px;color:#dbe8ff;max-height:420px;overflow:auto}.toast{position:fixed;right:18px;bottom:18px;background:#102033;border:1px solid var(--line);padding:13px 16px;border-radius:14px;opacity:0;transform:translateY(10px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}@media print{.side,.top button,.no-print{display:none}.app{display:block}main{max-width:none}.card{box-shadow:none;background:white;color:#111}body{background:white;color:#111}.muted,td{color:#333}}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.span3,.span4,.span5,.span6,.span7,.span8{grid-column:span 12}.top{align-items:flex-start;flex-direction:column}}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"No-API SEO Automation OS","applicationCategory":"BusinessApplication","description":"Offline SEO automation dashboard using browser localStorage only."}</script>
</head>
<body>
<div class="app"><aside class="side"><div class="brand"><span class="logo"></span>No-API SEO OS</div><div class="nav" id="nav"></div><p class="muted" style="margin-top:24px;font-size:13px">Works with no backend, no API keys, and no internet. All data is saved in this browser using localStorage.</p><button class="btn red" onclick="resetAll()">Reset Local Data</button></aside><main><div class="top"><div><span class="pill">Offline / static / no API</span><h1 id="pageTitle">Dashboard</h1></div><div class="row"><select id="projectSelect" onchange="selectProject(this.value)"></select><button class="btn primary" onclick="show('Audits')">Run Audit</button></div></div><div id="view"></div></main></div><div class="toast" id="toast"></div>
<script>
const $=s=>document.querySelector(s);const KEY='no_api_seo_os_v1';const views=['Dashboard','Projects','Audits','Keywords','Assets','Reports','Schedule','GEO'];let state=load();let active='Dashboard';
function seed(){return{projects:[{id:id(),name:'Example Brand',url:'https://example.com',niche:'SEO automation services',createdAt:now(),pages:['/','/services/','/blog/','/contact/'],keywords:[{cluster:'Technical SEO Automation',primary:'technical seo automation',intent:'Commercial',url:'/technical-seo-automation/'},{cluster:'Generative AI Search Optimization',primary:'generative ai search optimization',intent:'Informational',url:'/generative-ai-search-optimization/'}]}],audits:[],schedules:[]}}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch{return seed()}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function id(){return 'id_'+Math.random().toString(16).slice(2)+Date.now().toString(16)}function now(){return new Date().toISOString()}function project(){return state.projects.find(p=>p.id===state.projectId)||state.projects[0]}function boot(){state.projectId=state.projectId||state.projects[0]?.id;renderNav();renderSelect();show('Dashboard')}function renderNav(){nav.innerHTML=views.map(v=>`<button onclick="show('${v}')" data-v="${v}">${icon(v)} ${v}</button>`).join('')}function icon(v){return{Dashboard:'📊',Projects:'🏢',Audits:'🔍',Keywords:'🧠',Assets:'🧾',Reports:'📄',Schedule:'⏱️',GEO:'🤖'}[v]}function renderSelect(){projectSelect.innerHTML=state.projects.map(p=>`<option value="${p.id}" ${p.id===state.projectId?'selected':''}>${esc(p.name)}</option>`).join('')}function selectProject(id){state.projectId=id;save();show(active)}function show(v){active=v;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));pageTitle.textContent=v;view.innerHTML=({Dashboard,Projects,Audits,Keywords,Assets,Reports,Schedule,GEO})[v]()}function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function Dashboard(){const p=project();const latest=state.audits.filter(a=>a.projectId===p?.id).at(-1);return `<section class="hero"><h1>Automate SEO without APIs.</h1><p class="muted">This static dashboard handles project management, manual/pasted HTML audits, keyword intent mapping, sitemap/robots/schema generation, printable reports, schedules, and GEO planning entirely in your browser.</p><div class="row"><button class="btn primary" onclick="show('Audits')">Run no-API audit</button><button class="btn" onclick="show('Assets')">Generate assets</button></div></section><div class="grid"><div class="card span3 stat"><b>${state.projects.length}</b><span class="muted">Projects</span></div><div class="card span3 stat"><b>${state.audits.length}</b><span class="muted">Audits</span></div><div class="card span3 stat"><b>${p?.keywords?.length||0}</b><span class="muted">Keyword clusters</span></div><div class="card span3 stat"><b>${latest?latest.score:'—'}</b><span class="muted">Latest score</span></div><div class="card span8"><h2>What works without APIs?</h2>${[['Project database','Saved locally in your browser.'],['Audits','Uses URL settings and optional pasted page HTML/source.'],['Keyword clusters','Intent + URL mapping generated locally.'],['Sitemap/robots/schema','Generated instantly from project pages and keywords.'],['Reports','Printable report pages. Use Print → Save as PDF.'],['Schedules','Local schedule records and reminders.'],['GEO workspace','Entity and LLM-summary templates.']].map(x=>`<p><span class="ok">✓</span> <b>${x[0]}</b> <span class="muted">${x[1]}</span></p>`).join('')}</div><div class="card span4"><h2>Latest audit</h2>${latest?scoreBlock(latest)+auditTable(latest.checks.slice(0,4)):`<p class="muted">No audit yet.</p>`}</div></div>`}
function Projects(){return `<div class="grid"><div class="card span5"><h2>Add client project</h2><div class="form"><label>Name<input id="pname" placeholder="Client / Brand"></label><label>URL<input id="purl" placeholder="https://example.com"></label><label>Niche<textarea id="pniche" placeholder="What does this business do?"></textarea></label><label>Important pages, one per line<textarea id="ppages">/\n/services/\n/blog/\n/contact/</textarea></label><button class="btn primary" onclick="addProject()">Create Project</button></div></div><div class="card span7"><h2>Projects</h2><table><tr><th>Name</th><th>URL</th><th>Niche</th><th>Pages</th><th>Clusters</th></tr>${state.projects.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.url)}</td><td>${esc(p.niche||'')}</td><td>${p.pages?.length||0}</td><td>${p.keywords?.length||0}</td></tr>`).join('')}</table></div></div>`}
function addProject(){state.projects.push({id:id(),name:pname.value||'Untitled Project',url:purl.value||'https://example.com',niche:pniche.value||'',createdAt:now(),pages:lines(ppages.value),keywords:[]});state.projectId=state.projects.at(-1).id;save();renderSelect();show('Projects');toast('Project created')}
function lines(s){return String(s||'').split('\n').map(x=>x.trim()).filter(Boolean).map(x=>x.startsWith('/')?x:'/'+x)}
function Audits(){const p=project();const audits=state.audits.filter(a=>a.projectId===p?.id).reverse();return `<div class="grid"><div class="card span5"><h2>No-API audit runner</h2><p class="muted">Because browsers block most cross-site page fetching without APIs, paste page HTML/source for deeper checks. If you leave HTML blank, the audit checks project configuration only.</p><label>Page URL<input id="auditUrl" value="${esc(p?.url||'')}"></label><label>Paste page HTML/source, optional<textarea id="auditHtml" placeholder="Paste View Source HTML here for title/meta/H1/canonical/schema/image checks"></textarea></label><button class="btn primary" onclick="runAudit()">Run Local Audit</button></div><div class="card span7"><h2>Audit history</h2>${audits.length?audits.map(a=>`<div class="card" style="margin-bottom:10px"><div class="row" style="justify-content:space-between"><b>${new Date(a.createdAt).toLocaleString()}</b><span class="pill">${a.score}/100</span><button class="btn" onclick="openReport('${a.id}')">Open report</button></div>${auditTable(a.checks)}</div>`).join(''):'<p class="muted">No audits yet.</p>'}</div></div>`}
function runAudit(){const p=project(),url=(auditUrl?.value||p.url),html=(auditHtml?.value||'');const checks=buildChecks(p,url,html);const audit={id:id(),projectId:p.id,createdAt:now(),url,score:score(checks),checks,htmlProvided:!!html};state.audits.push(audit);save();show('Audits');toast('Audit complete: '+audit.score+'/100')}
function buildChecks(p,url,html){const title=extract(html,/<title[^>]*>([\s\S]*?)<\/title>/i),meta=extract(html,/<meta[^>]+name=["']description["'][^>]+content=["']([^"']*)["'][^>]*>/i)||extract(html,/<meta[^>]+content=["']([^"']*)["'][^>]+name=["']description["'][^>]*>/i),h1=count(html,/<h1\b/gi),canonical=/rel=["']canonical["']/i.test(html),viewport=/name=["']viewport["']/i.test(html),schema=/application\/ld\+json/i.test(html),imgs=count(html,/<img\b/gi),missing=(html.match(/<img\b(?![^>]*\balt=)[^>]*>/gi)||[]).length,hasHtml=html.trim().length>0;let c=[];add(c,!!url,8,'Project URL set',url||'Missing URL','Add the canonical project URL.');add(c,String(url).startsWith('https://'),12,'HTTPS URL configured',String(url).startsWith('https://')?'HTTPS URL used.':'URL is not HTTPS.','Use HTTPS and redirect HTTP to HTTPS.');add(c,(p.pages||[]).length>0,8,'Pages mapped',`${(p.pages||[]).length} pages saved.`,'Add all indexable page paths.');add(c,(p.keywords||[]).length>0,10,'Keyword clusters mapped',`${(p.keywords||[]).length} clusters saved.`,'Map primary and long-tail clusters to unique URLs.');add(c,hasHtml,7,'HTML provided for page-level audit',hasHtml?'HTML pasted.':'No HTML pasted; page-level checks are limited.','Paste page source for complete checks.');add(c,!hasHtml||(title.length>10&&title.length<=60),10,'Optimized title tag',hasHtml?(title?`${title.length} chars: ${title}`:'No title detected.'):'Skipped until HTML is pasted.','Use a unique title under 60 characters.');add(c,!hasHtml||(meta.length>50&&meta.length<=160),9,'Meta description',hasHtml?(meta?`${meta.length} characters.`:'No meta description detected.'):'Skipped until HTML is pasted.','Write a CTR-focused description under 160 characters.');add(c,!hasHtml||h1===1,10,'Single H1',hasHtml?`${h1} H1 tags detected.`:'Skipped until HTML is pasted.','Use exactly one H1 per page.');add(c,!hasHtml||canonical,8,'Canonical tag',hasHtml?(canonical?'Canonical detected.':'Missing canonical.'):'Skipped until HTML is pasted.','Add a self-referential canonical.');add(c,!hasHtml||viewport,8,'Mobile viewport',hasHtml?(viewport?'Viewport detected.':'Viewport missing.'):'Skipped until HTML is pasted.','Add a responsive viewport meta tag.');add(c,!hasHtml||schema,8,'JSON-LD schema',hasHtml?(schema?'Schema detected.':'No JSON-LD detected.'):'Skipped until HTML is pasted.','Add relevant structured data.');add(c,!hasHtml||missing===0,7,'Image alt text',hasHtml?`${missing} of ${imgs} images missing alt attributes.`:'Skipped until HTML is pasted.','Add descriptive image alt text.');return c}
function extract(h,r){const m=String(h).match(r);return m?m[1].replace(/\s+/g,' ').trim():''}function count(h,r){return(String(h).match(r)||[]).length}function add(a,pass,weight,title,detail,rec){a.push({pass,weight,title,detail,recommendation:rec,impact:weight>=10?'High':weight>=8?'Medium':'Low'})}function score(c){let max=c.reduce((a,x)=>a+x.weight,0),got=c.reduce((a,x)=>a+(x.pass?x.weight:0),0);return Math.round(got/max*100)}function scoreBlock(a){return `<div class="score" style="--p:${a.score}"><div>${a.score}</div></div>`}function auditTable(checks){return `<table><tr><th></th><th>Check</th><th>Impact</th><th>Recommendation</th></tr>${checks.map(c=>`<tr><td>${c.pass?'<span class="ok">✓</span>':'<span class="warn">!</span>'}</td><td><b>${esc(c.title)}</b><br><span class="muted">${esc(c.detail)}</span></td><td>${c.impact}</td><td>${esc(c.recommendation)}</td></tr>`).join('')}</table>`}
function Keywords(){const p=project();return `<div class="grid"><div class="card span5"><h2>Keyword cluster mapper</h2><p class="muted">Enter seed terms. Intent and URL slugs are generated locally.</p><textarea id="kwSeeds">seo automation services\ntechnical seo audit software\nhow to optimize for ai search\nlocal seo checklist</textarea><button class="btn primary" onclick="clusterKeywords()">Generate Clusters</button></div><div class="card span7"><h2>Current map</h2>${keywordTable(p)}</div></div>`}function keywordTable(p){return `<table><tr><th>Cluster</th><th>Primary</th><th>Intent</th><th>URL</th></tr>${(p?.keywords||[]).map(k=>`<tr><td>${esc(k.cluster)}</td><td>${esc(k.primary)}</td><td>${k.intent}</td><td>${esc(k.url)}</td></tr>`).join('')}</table>`}function clusterKeywords(){project().keywords=String(kwSeeds.value).split(/[\n,]/).map(x=>x.trim()).filter(Boolean).map(kw=>({cluster:kw.replace(/\b\w/g,m=>m.toUpperCase()),primary:kw.toLowerCase(),intent:inferIntent(kw),url:'/'+slug(kw)+'/' }));save();show('Keywords');toast('Clusters generated')}function inferIntent(kw){kw=kw.toLowerCase();if(/buy|price|pricing|near me|service|agency|software|tool|best/.test(kw))return'Commercial';if(/how|what|why|guide|tips|example|checklist/.test(kw))return'Informational';if(/login|brand|contact/.test(kw))return'Navigational';return'Informational'}function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function Assets(){return `<div class="grid"><div class="card span4"><h2>Asset generators</h2><div class="row"><button class="btn" onclick="asset('sitemap')">Sitemap</button><button class="btn" onclick="asset('robots')">Robots</button><button class="btn" onclick="asset('schema')">Schema</button><button class="btn" onclick="asset('meta')">Meta</button></div><p class="muted">Generated from your local project fields and keyword map.</p></div><div class="card span8"><h2 id="assetTitle">Generated output</h2><pre id="assetOut">Click an asset button.</pre><button class="btn primary" onclick="copy(assetOut.textContent)">Copy Output</button><button class="btn" onclick="downloadAsset()">Download .txt</button></div></div>`}function base(){return project().url.replace(/\/$/,'')}function asset(t){const p=project();assetTitle.textContent=t;let out='';if(t==='sitemap')out=`<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n${[...(p.pages||['/']),...(p.keywords||[]).map(k=>k.url)].filter((v,i,a)=>a.indexOf(v)===i).map(u=>`  <url>\n    <loc>${base()}${u.startsWith('/')?u:'/'+u}</loc>\n    <lastmod>${new Date().toISOString().slice(0,10)}</lastmod>\n    <changefreq>${u==='/'?'weekly':'monthly'}</changefreq>\n    <priority>${u==='/'?'1.0':'0.8'}</priority>\n  </url>`).join('\n')}\n</urlset>`;if(t==='robots')out=`User-agent: *\nAllow: /\nDisallow: /admin/\nDisallow: /private/\nDisallow: /search?\n\nSitemap: ${base()}/sitemap.xml`;if(t==='schema')out=`<script type="application/ld+json">\n${JSON.stringify({'@context':'https://schema.org','@type':'Organization',name:p.name,url:p.url,description:p.niche,knowsAbout:(p.keywords||[]).map(k=>k.cluster)},null,2)}\n<\/script>`;if(t==='meta'){const kw=p.keywords?.[0]?.primary||p.niche||p.name,title=(kw+' | '+p.name).slice(0,60),desc=(p.niche||`Learn about ${kw} from ${p.name}.`).slice(0,160);out=`<title>${esc(title)}</title>\n<meta name="description" content="${esc(desc)}">\n<link rel="canonical" href="${base()}/">\n<meta property="og:title" content="${esc(title)}">\n<meta property="og:description" content="${esc(desc)}">\n<meta property="og:url" content="${base()}/">`;}assetOut.textContent=out}function downloadAsset(){const blob=new Blob([assetOut.textContent],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(assetTitle.textContent||'seo-asset')+'.txt';a.click();URL.revokeObjectURL(a.href)}
function Reports(){const reports=state.audits.slice().reverse();return `<div class="card"><h2>Printable reports</h2><p class="muted">Open a report, then use Print → Save as PDF. No PDF API is required.</p><table><tr><th>Project</th><th>Date</th><th>Score</th><th>Report</th></tr>${reports.map(a=>`<tr><td>${esc(state.projects.find(p=>p.id===a.projectId)?.name||'')}</td><td>${new Date(a.createdAt).toLocaleString()}</td><td>${a.score}/100</td><td><button class="btn" onclick="openReport('${a.id}')">Open report</button></td></tr>`).join('')}</table></div>`}function openReport(id){const a=state.audits.find(x=>x.id===id),p=state.projects.find(x=>x.id===a.projectId);view.innerHTML=`<div class="card"><button class="btn primary no-print" onclick="print()">Print / Save as PDF</button><button class="btn no-print" onclick="show('Reports')">Back</button><h1>SEO Report</h1><p class="muted">${esc(p.name)} — ${esc(a.url)} — ${new Date(a.createdAt).toLocaleString()}</p>${scoreBlock(a)}<h2>Findings</h2>${auditTable(a.checks)}<h2>Generated Robots.txt</h2><pre>${esc(genRobots(p))}</pre></div>`;pageTitle.textContent='Report'}function genRobots(p){return`User-agent: *\nAllow: /\nDisallow: /admin/\nDisallow: /private/\nDisallow: /search?\n\nSitemap: ${p.url.replace(/\/$/,'')}/sitemap.xml`}
function Schedule(){const p=project();return `<div class="grid"><div class="card span5"><h2>Local audit schedule</h2><p class="muted">This saves a reminder schedule locally. Since there is no backend, it cannot run while the page is closed.</p><label>Frequency<select id="freq"><option>weekly</option><option>daily</option><option>monthly</option></select></label><label>Day<select id="day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select></label><button class="btn primary" onclick="saveSchedule()">Save Reminder</button></div><div class="card span7"><h2>Saved reminders</h2><table><tr><th>Project</th><th>Frequency</th><th>Day</th></tr>${state.schedules.map(s=>`<tr><td>${esc(state.projects.find(p=>p.id===s.projectId)?.name||'')}</td><td>${s.frequency}</td><td>${s.day}</td></tr>`).join('')}</table></div></div>`}function saveSchedule(){state.schedules=state.schedules.filter(s=>s.projectId!==state.projectId);state.schedules.push({projectId:state.projectId,frequency:freq.value,day:day.value,createdAt:now()});save();show('Schedule');toast('Reminder saved')}
function GEO(){const p=project();return `<div class="grid"><div class="card span6"><h2>GEO checklist</h2>${['Put direct factual answers in the first 1-2 sentences.','Use consistent brand/entity names across schema, bios, social profiles, and local listings.','Add FAQ sections with concise answer blocks.','Create definition, comparison, and process pages LLMs can summarize easily.','Use verifiable claims, proof points, case studies, and author credentials.'].map(x=>`<p><span class="ok">✓</span> ${x}</p>`).join('')}</div><div class="card span6"><h2>Entity profile template</h2><pre>${JSON.stringify({brand:p.name,url:p.url,category:p.niche,expertise:(p.keywords||[]).map(k=>k.cluster),sameAs:['LinkedIn','Google Business Profile','industry directories'],proof:['case studies','reviews','citations','author credentials']},null,2)}</pre><button class="btn primary" onclick="copy(document.querySelector('pre').textContent)">Copy Entity Profile</button></div></div>`}
function copy(t){navigator.clipboard.writeText(t);toast('Copied')}function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}function resetAll(){if(confirm('Delete all local projects, audits, and schedules?')){localStorage.removeItem(KEY);state=seed();save();renderSelect();show('Dashboard')}}boot();
</script>
</body>
</html>
